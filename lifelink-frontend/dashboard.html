<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLink Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#1d4ed8; --primary-dk:#1e3a8a; --primary-lt:#3b82f6; --primary-soft:#eff6ff;
      --accent:#10b981;  --accent-dk:#059669;  --accent-soft:#d1fae5;
      --cyan:#0891b2;    --cyan-soft:#ecfeff;
      --gold:#f59e0b;    --text:#0f172a; --text-soft:#475569; --muted:#94a3b8;
      --border:#dbeafe;  --bg:#f0f4ff;   --white:#fff;
      --fh:"Syne",sans-serif; --fb:"DM Sans",sans-serif; --fm:"Space Mono",monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden}
    button{cursor:pointer;font:inherit;border:0}
    a{text-decoration:none}

    /* ── TOPBAR ── */
    .topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 2px 10px rgba(29,78,216,0.07);display:flex;align-items:center;padding:0 20px;gap:0}
    .nav-logo{display:flex;align-items:center;gap:9px;font:800 19px var(--fh);color:var(--primary);flex:0 0 auto;margin-right:20px}
    .nav-logo em{color:var(--accent);font-style:normal}
    .logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-lt));display:grid;place-items:center;color:#fff;font-size:16px;animation:pulseLogo 2.4s infinite}
    @keyframes pulseLogo{0%,100%{box-shadow:0 0 0 0 rgba(29,78,216,0.35)}50%{box-shadow:0 0 0 7px rgba(29,78,216,0)}}
    .nav-tabs{display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
    .nav-tabs::-webkit-scrollbar{display:none}
    .nav-tab{display:flex;align-items:center;gap:6px;height:62px;padding:0 16px;border-bottom:3px solid transparent;background:transparent;color:var(--text-soft);font:600 13px var(--fb);white-space:nowrap;transition:color .18s,border-color .18s,background .18s}
    .nav-tab:hover{color:var(--primary);background:var(--primary-soft)}
    .nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:800}
    .nav-right{display:flex;align-items:center;gap:10px;flex:0 0 auto;margin-left:12px}
    .rt-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:rtPulse 1.8s infinite}
    @keyframes rtPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
    .rt-label{font:700 10px var(--fm);color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
    .sos-btn{background:linear-gradient(135deg,var(--primary),var(--primary-lt));color:#fff;border-radius:9px;padding:8px 14px;font:800 12px var(--fh);animation:pulseSOS 2.5s infinite;transition:transform .15s,filter .15s}
    .sos-btn:hover{transform:scale(1.06);filter:brightness(1.1)}
    @keyframes pulseSOS{0%,100%{box-shadow:0 0 0 0 rgba(29,78,216,0.45)}60%{box-shadow:0 0 0 8px rgba(29,78,216,0)}}
    .user-chip{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 7px;background:linear-gradient(135deg,var(--role-color,var(--primary)),var(--role-dark,var(--primary-dk)));border-radius:999px;color:#fff;transition:transform .18s,box-shadow .18s;cursor:default}
    .user-chip:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(29,78,216,0.28)}
    .u-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.28);display:grid;place-items:center;font:800 11px var(--fh);flex:0 0 auto}
    .u-name{font:800 12px var(--fh)}
    .u-role{font:700 9px var(--fm);opacity:.8;text-transform:uppercase;letter-spacing:.4px}
    .chip-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;border-radius:7px;padding:4px 9px;font:700 10px var(--fh);transition:background .15s}
    .chip-btn:hover{background:rgba(255,255,255,0.28)}

    /* ── MAIN ── */
    .main{margin-top:62px;min-height:calc(100vh - 62px);padding:28px 32px 56px;max-width:1280px;margin-left:auto;margin-right:auto}
    .panel{display:none}.panel.active{display:block}

    /* ── TYPOGRAPHY ── */
    .eyebrow{color:var(--primary-lt);font:700 10px var(--fm);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
    .page-title{margin:0 0 6px;font:800 clamp(24px,3vw,36px)/1.1 var(--fh)}
    .page-title span{color:var(--accent)}
    .page-sub{margin:0;color:var(--text-soft);max-width:620px;line-height:1.6;font-size:14px}

    /* ── STATS ── */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s}
    .stat-card:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(29,78,216,0.1);border-color:#bfdbfe}
    .stat-card::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--sc-color,var(--primary))}
    .stat-num{font:800 28px var(--fh);margin-bottom:3px}
    .stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:800}
    .stat-note{margin-top:5px;color:var(--text-soft);font-size:11px}

    /* ── GRID ── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:start}
    .grid-1-2{display:grid;grid-template-columns:1fr 2fr;gap:18px;align-items:start}

    /* ── CARDS ── */
    .card{background:var(--white);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:18px;transition:transform .2s,box-shadow .2s,border-color .2s}
    .card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(29,78,216,0.08);border-color:#bfdbfe}
    .card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
    .card-title{font:800 13px var(--fh)}
    .card-body{padding:18px}

    /* ── BADGES ── */
    .badge{border-radius:999px;padding:3px 9px;font:700 9px var(--fm);white-space:nowrap}
    .badge-live{color:var(--accent);background:rgba(16,185,129,0.14);border:1px solid rgba(16,185,129,0.26)}
    .badge-urgent{color:var(--cyan);background:rgba(8,145,178,0.12);border:1px solid rgba(8,145,178,0.24)}
    .badge-info{color:var(--primary);background:rgba(29,78,216,0.12);border:1px solid rgba(29,78,216,0.18)}
    .badge-ok{color:var(--accent);background:var(--accent-soft)}

    /* ── LIST ITEMS ── */
    .li{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f0f4ff}
    .li:last-child{border-bottom:0}
    .li-icon{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);font:800 11px var(--fh);flex:0 0 auto}
    .li-body{flex:1;min-width:0}
    .li-title{font-weight:800;font-size:13px}
    .li-sub{color:var(--muted);font-size:11px;margin-top:2px}
    .li-right{text-align:right;font:700 11px var(--fm);flex:0 0 auto}

    /* ── FORMS ── */
    .fg{margin-bottom:14px}
    .fl{display:block;margin-bottom:5px;color:var(--text-soft);font:700 10px var(--fm);text-transform:uppercase;letter-spacing:.5px}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .fi,.fs,textarea.fi{width:100%;min-height:40px;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;background:#f8faff;color:var(--text);font:400 13px var(--fb);outline:none;transition:border-color .18s,box-shadow .18s,background .18s}
    .fi:hover,.fs:hover{border-color:var(--primary-lt);background:#fff}
    .fi:focus,.fs:focus{border-color:var(--primary-lt);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
    textarea.fi{min-height:80px;resize:vertical}

    /* ── BUTTONS ── */
    .btn,.btn-sec,.btn-green,.btn-cyan{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:38px;border-radius:10px;padding:8px 16px;font:800 12px var(--fh);cursor:pointer;border:0;transition:transform .17s,box-shadow .17s,filter .17s}
    .btn{background:linear-gradient(135deg,var(--primary),var(--primary-lt));color:#fff;box-shadow:0 3px 10px rgba(29,78,216,0.22)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(29,78,216,0.3);filter:brightness(1.05)}
    .btn-green{background:linear-gradient(135deg,var(--accent),#34d399);color:#fff;box-shadow:0 3px 10px rgba(16,185,129,0.22)}
    .btn-green:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(16,185,129,0.3)}
    .btn-cyan{background:linear-gradient(135deg,var(--cyan),#06b6d4);color:#fff}
    .btn-cyan:hover{transform:translateY(-2px);filter:brightness(1.08)}
    .btn-sec{background:#f8faff;color:var(--text-soft);border:1px solid var(--border)}
    .btn-sec:hover{background:var(--primary-soft);color:var(--primary);border-color:var(--primary-lt)}
    .btn:disabled{opacity:.6;cursor:progress;transform:none;box-shadow:none}

    /* ── MESSAGE ── */
    .msg{min-height:16px;font-size:12px;margin-top:8px;transition:color .2s}
    .msg.ok{color:var(--accent)}.msg.err{color:var(--cyan)}

    /* ── INVENTORY ── */
    .inv-row{display:grid;grid-template-columns:44px 1fr 58px 76px;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f4ff}
    .inv-row:last-child{border-bottom:0}
    .inv-type{font:800 13px var(--fh)}
    .inv-bar-bg{height:7px;border-radius:999px;background:#f0f4ff;overflow:hidden}
    .inv-bar{height:100%;border-radius:999px;transition:width .5s}
    .inv-units{color:var(--muted);font:700 11px var(--fm);text-align:right}
    .inv-status{border-radius:5px;padding:2px 6px;font-size:10px;font-weight:800;text-align:center}
    .st-ok{color:var(--accent);background:rgba(16,185,129,0.12)}
    .st-low{color:var(--gold);background:rgba(245,158,11,0.12)}
    .st-crit{color:var(--primary);background:rgba(29,78,216,0.1)}

    /* ── ALERT BANNER ── */
    .banner{display:flex;gap:10px;margin-bottom:18px;padding:12px 16px;border-radius:13px;border:1px solid rgba(8,145,178,0.25);background:rgba(8,145,178,0.08);color:#0e7490;line-height:1.5;font-size:13px}

    /* ── MAP BLOCK ── */
    .map-block{position:relative;min-height:240px;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1px solid var(--border);cursor:pointer}
    .map-block::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(29,78,216,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(29,78,216,0.07) 1px,transparent 1px);background-size:36px 36px}
    .map-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,0.55);backdrop-filter:blur(2px);opacity:0;transition:opacity .22s;z-index:3}
    .map-block:hover .map-ov{opacity:1}
    .map-ov strong{font:800 13px var(--fh);color:var(--primary)}
    .map-ov small{font-size:11px;color:var(--text-soft)}
    .pin{position:absolute;transform:translate(-50%,-50%);z-index:2;text-align:center}
    .pin-dot{width:13px;height:13px;border-radius:50%;margin:0 auto 3px;border:2px solid #fff;box-shadow:0 0 0 4px rgba(29,78,216,0.12)}
    .pin-label{font:700 9px var(--fm);background:#fff;border-radius:4px;padding:2px 5px;white-space:nowrap;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

    /* ── STEP ── */
    .step{display:flex;gap:11px;align-items:flex-start}
    .step-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-lt));color:#fff;display:grid;place-items:center;font:800 11px var(--fh);flex:0 0 auto}
    .step-title{font:800 13px var(--fh);margin-bottom:2px}
    .step-desc{font-size:11px;color:var(--text-soft);line-height:1.5}

    /* ── REALTIME TOAST ── */
    #rt-toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .rt-toast-item{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:12px;padding:12px 16px;box-shadow:0 8px 24px rgba(29,78,216,0.15);font-size:13px;max-width:320px;animation:slideIn .3s ease;pointer-events:auto}
    @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
    .rt-toast-title{font:800 13px var(--fh);margin-bottom:3px}
    .rt-toast-close{float:right;background:none;color:var(--muted);font-size:16px;line-height:1;margin-left:8px;cursor:pointer}

    /* ── PAGE HEADER ── */
    .ph{margin-bottom:24px}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){.main{padding:20px 14px 48px}.grid-2,.grid-3,.grid-1-2,.fr{grid-template-columns:1fr}.inv-row{grid-template-columns:40px 1fr}.inv-units,.inv-status{text-align:left}.u-name,.u-role{display:none}}
    @media(max-width:600px){.topbar{padding:0 10px}.nav-tab{padding:0 10px;font-size:11px}.sos-btn{padding:7px 10px;font-size:11px}}
  </style>
</head>
<body>

<!-- ═══════ TOPBAR ═══════ -->
<header class="topbar">
  <a class="nav-logo" href="#">
    <div class="logo-mark">🩸</div>Life<em>Link</em>
  </a>
  <nav class="nav-tabs" id="navTabs"></nav>
  <div class="nav-right">
    <div class="rt-dot" id="rtDot" title="Real-time connected"></div>
    <span class="rt-label" id="rtLabel">Live</span>
    <button class="sos-btn" id="sosBtn" type="button">🆘 SOS</button>
    <div class="user-chip" id="userChip">
      <div class="u-avatar" id="uAvatar">LL</div>
      <div><div class="u-name" id="uName">Loading</div><div class="u-role" id="uRole">LifeLink</div></div>
      <button class="chip-btn" onclick="LL.clearSession();location.href='./login.html'">Switch</button>
      <button class="chip-btn" onclick="LL.logout()">Logout</button>
    </div>
  </div>
</header>

<!-- ═══════ PANELS ═══════ -->
<main class="main" id="main"></main>

<!-- ═══════ RT TOASTS ═══════ -->
<div id="rt-toast"></div>

<script src="./lifelink-api.js"></script>
<script>
LL.requireAuth();

/* ═══════════════════════════════════════════
   STATE & CONSTANTS
═══════════════════════════════════════════ */
const S = { user: null, inventory: [], donors: [], alerts: [], socket: null };

const ROLE_META = {
  donor:     { label:'Blood Donor', color:'#1d4ed8', dark:'#1e3a8a', av:'BD' },
  receiver:  { label:'Receiver',    color:'#0891b2', dark:'#0e7490', av:'RC' },
  hospital:  { label:'Hospital',    color:'#0369a1', dark:'#075985', av:'HP' },
  bloodbank: { label:'Blood Bank',  color:'#10b981', dark:'#059669', av:'BB' },
  admin:     { label:'Admin',       color:'#475569', dark:'#0f172a', av:'AD' },
};

// Role-specific tabs — only what each role needs
const ROLE_TABS = {
  donor:     [{id:'home',label:'🏠 Home'},{id:'requests',label:'🩸 Blood Requests'},{id:'history',label:'📋 My History'}],
  receiver:  [{id:'home',label:'🏠 Home'},{id:'find',label:'🔍 Find Blood'},{id:'request',label:'📝 Request Blood'}],
  hospital:  [{id:'home',label:'🏠 Home'},{id:'dispatch',label:'🚑 Dispatch'},{id:'inventory',label:'🏥 Inventory'},{id:'alerts',label:'⚠️ Create Alert'}],
  bloodbank: [{id:'home',label:'🏠 Home'},{id:'stock',label:'📦 Stock'},{id:'records',label:'💉 Add Record'},{id:'expiry',label:'⏳ Expiry Watch'}],
};

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function initials(n='LL'){return n.trim().split(/\s+/).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'LL'}
function rlabel(r){return ROLE_META[r]?.label||'LifeLink'}
function mapsUrl(lat,lng,q){return (lat&&lng)?`https://www.google.com/maps?q=${lat},${lng}&z=15`:`https://www.google.com/maps/search/${encodeURIComponent(q||'blood bank near me')}`}

function toast(title, body='', color='var(--primary)'){
  const box=document.getElementById('rt-toast');
  const el=document.createElement('div');
  el.className='rt-toast-item';
  el.style.borderLeftColor=color;
  el.innerHTML=`<button class="rt-toast-close" onclick="this.parentElement.remove()">×</button><div class="rt-toast-title">${esc(title)}</div><div style="color:var(--text-soft)">${esc(body)}</div>`;
  box.appendChild(el);
  setTimeout(()=>el.remove(),6000);
}

function setMsg(id,text,type=''){
  const el=document.getElementById(id);
  if(el){el.textContent=text;el.className='msg '+(text?type:'')}
}

/* ═══════════════════════════════════════════
   REALTIME — SOCKET.IO
═══════════════════════════════════════════ */
function initSocket(){
  if(typeof io==='undefined') return;
  const socket = io(LL.origin, { transports:['websocket','polling'] });
  S.socket = socket;

  socket.on('connect', ()=>{
    document.getElementById('rtDot').style.background='var(--accent)';
    document.getElementById('rtLabel').textContent='Live';
    const city = S.user?.location?.city;
    if(city) socket.emit('join_city', city);
  });

  socket.on('disconnect',()=>{
    document.getElementById('rtDot').style.background='var(--muted)';
    document.getElementById('rtLabel').textContent='Offline';
  });

  // New blood alert — show to donors
  socket.on('new_alert', alert=>{
    if(S.user?.role==='donor'){
      toast('🩸 New Blood Request', `${alert.bloodType||''} needed at ${alert.hospital?.name||'hospital'}`, 'var(--primary)');
      if(document.getElementById('panel-requests')?.classList.contains('active')) loadDonorRequests();
    }
    if(S.user?.role==='hospital'||S.user?.role==='bloodbank') toast('📢 Alert Created', alert.title||'New blood request');
  });

  // Alert status update
  socket.on('alert_updated', data=>{
    toast('✅ Alert Updated', `Status: ${data.status}`, 'var(--accent)');
    if(S.user?.role==='donor') loadDonorRequests();
  });

  // Blood stock update
  socket.on('blood_stock_updated', data=>{
    toast('📦 Stock Updated', `Hospital inventory changed`, 'var(--cyan)');
    if(document.getElementById('panel-stock')?.classList.contains('active')) loadInventory();
  });

  // Emergency broadcast
  socket.on('emergency_alert', data=>{
    toast('🚨 EMERGENCY', `${data.bloodType||''} urgently needed`, 'var(--cyan)');
  });

  // Donor status change
  socket.on('donor_status_changed', data=>{
    if(data.userId===S.user?.id||data.userId===S.user?._id){
      toast('👤 Status Changed', data.status);
    }
  });
}

/* ═══════════════════════════════════════════
   NAV & PANEL SWITCH
═══════════════════════════════════════════ */
function buildNav(user){
  const tabs = ROLE_TABS[user.role] || ROLE_TABS.donor;
  const nav  = document.getElementById('navTabs');
  nav.innerHTML = tabs.map((t,i)=>`
    <button class="nav-tab ${i===0?'active':''}" data-panel="${t.id}" type="button">${t.label}</button>
  `).join('');
  nav.querySelectorAll('.nav-tab').forEach(b=>b.addEventListener('click',()=>switchPanel(b.dataset.panel)));

  // Build panel containers
  const main = document.getElementById('main');
  main.innerHTML = tabs.map((t,i)=>`<div class="panel ${i===0?'active':''}" id="panel-${t.id}"></div>`).join('');
}

function switchPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${id}`));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.panel===id));
  window.scrollTo({top:0,behavior:'smooth'});
  // Lazy-load panel content
  const role = S.user?.role;
  if(role==='donor'){
    if(id==='requests') loadDonorRequests();
    if(id==='history')  renderDonorHistory();
  }
  if(role==='receiver'){
    if(id==='find') renderReceiverFind();
  }
  if(role==='hospital'){
    if(id==='dispatch')  loadHospitalDispatch();
    if(id==='inventory') loadInventory('panel-inventory');
  }
  if(role==='bloodbank'){
    if(id==='stock')  loadInventory('panel-stock');
    if(id==='expiry') renderExpiryWatch();
  }
}

/* ═══════════════════════════════════════════
   SHELL
═══════════════════════════════════════════ */
function renderShell(user){
  S.user = user;
  const rm = ROLE_META[user.role]||ROLE_META.admin;
  const chip = document.getElementById('userChip');
  chip.style.setProperty('--role-color', rm.color);
  chip.style.setProperty('--role-dark',  rm.dark);

function alertRow(a){
  const coords=a.hospital?.location?.coordinates||[];
  const lat=coords[1], lng=coords[0];
  const locTxt=(lat&&lng)?`${Number(lat).toFixed(3)}, ${Number(lng).toFixed(3)}`:(a.hospital?.address||'Location on accept');
  const mapLink=(lat&&lng)?mapsUrl(lat,lng,a.hospital?.name):'#';
  const id=esc(a._id||a.id||'');
  const sev=a.severity||'info';
  const sevColor=sev==='critical'?'var(--cyan)':sev==='warning'?'var(--gold)':'var(--accent)';
  return `
    <div class="li">
      <div class="li-icon" style="background:${sev==='critical'?'var(--cyan-soft)':'var(--primary-soft)'};color:${sevColor}">${esc(a.bloodType||'?')}</div>
      <div class="li-body">
        <div class="li-title">${esc(a.title||'Blood request')}</div>
        <div class="li-sub">${esc(a.message||'')} · ${esc(a.unitsNeeded||1)} unit(s)</div>
        <div class="li-sub">🏥 ${esc(a.hospital?.name||'Hospital')} · <a href="${mapLink}" target="_blank" style="color:var(--primary);font-weight:700">${esc(locTxt)}</a></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">

  `;
}

async function acceptAlert(id){
  if(!id) return;
  setMsg('acceptMsg','Accepting...','');
  try{
    const data = await LL.acceptAlert(id);
    setMsg('acceptMsg', data.message||'Accepted!','ok');
    if(data.user){ S.user=data.user; LL.setSession({user:data.user}); renderShell(data.user); }
    toast('✅ Request Accepted','Head to the hospital. Your donation will be recorded on completion.','var(--accent)');
    loadDonorRequests();
  }catch(e){ setMsg('acceptMsg',e.message,'err'); }
}

async function runDispatch(e){
  e.preventDefault();
  const form=e.currentTarget;
  const payload=Object.fromEntries(new FormData(form));
  setMsg('dispatchMsg','Searching...','');
  try{
    const coords=S.user.location?.coordinates||[80.2707,13.0827];
    const data=await LL.request(`/match-donors`,{method:'POST',body:{bloodType:payload.bloodType,lat:coords[1],lng:coords[0],isEmergency:payload.urgency==='critical'}});
    const donors=data.donors||[];
    const el=document.getElementById('dispatchResults');
    el.innerHTML=donors.length
      ?donors.slice(0,8).map((d,i)=>`
        <div class="li">
          <div class="li-icon" style="background:var(--primary-soft);color:var(--primary)">#${i+1}</div>
          <div class="li-body">
            <div class="li-title">${esc(d.name||'Donor')} · ${esc(d.bloodType)}</div>
            <div class="li-sub">${d.distance?d.distance.toFixed(1)+'km':''} · ${esc(d.status||'available')} · ${d.donations||0} donations</div>
          </div>
          <div class="li-right">${d.score?Math.round(d.score*100)+'/100':'—'}</div>
        </div>`).join('')
      :'<p class="page-sub">No donors found. Try expanding the search radius.</p>';
    setMsg('dispatchMsg','','');
  }catch(er){setMsg('dispatchMsg',er.message,'err')}
}

  const el=document.getElementById(panelId);

    S.inventory=data.inventory||[];

    const crit=S.inventory.filter(r=>['critical','expired'].includes(r.expiryStatus||r.status)).length;
    el.innerHTML=`
      <div class="ph"><div class="eyebrow">${S.user?.role==='hospital'?'Hospital':'Blood Bank'}</div><h1 class="page-title">📦 Blood <span>Stock</span></h1><p class="page-sub">Live inventory from LifeLink network.</p></div>
      <div class="stats-row">

        <div class="stat-card" style="--sc-color:#f59e0b"><div class="stat-num">${exp}</div><div class="stat-label">Expiring ≤7 Days</div></div>

  }catch(e){el.innerHTML=`<p class="msg err" style="padding:20px">${esc(e.message)}</p>`}

/* ═══════════════════════════════════════════
   SHARED HELPERS
═══════════════════════════════════════════ */
function invRow(item){
  const units=Number(item.units||0);
  const status=item.expiryStatus||item.status||(units<5?'critical':units<10?'low':'ok');
  const pct=Math.min(100,Math.max(4,units*6));
  const color=status==='critical'||status==='expired'?'var(--cyan)':status==='low'?'var(--gold)':'var(--accent)';
  const klass=status==='critical'||status==='expired'?'st-crit':status==='low'?'st-low':'st-ok';
  return `<div class="inv-row">
    <div class="inv-type">${esc(item.bloodType||'?')}</div>
    <div><div class="inv-bar-bg"><div class="inv-bar" style="width:${pct}%;background:${color}"></div></div>
    <div class="li-sub">${esc(String(item.component||'whole blood').replace('_',' '))} · exp ${esc(LL.formatDate(item.expiryDate))}</div></div>
    <div class="inv-units">${units}u</div>
    <div class="inv-status ${klass}">${esc(status)}</div>
  </div>`;
}

function li(icon,title,sub,right){
  return `<div class="li"><div class="li-icon">${esc(icon)}</div><div class="li-body"><div class="li-title">${esc(title)}</div><div class="li-sub">${esc(sub)}</div></div>${right?`<div class="li-right">${esc(right)}</div>`:''}</div>`;
}

function step(num,title,desc){
  return `<div class="step"><div class="step-num">${num}</div><div><div class="step-title">${esc(title)}</div><div class="step-desc">${esc(desc)}</div></div></div>`;
}

    <div class="grid-1-2">

        <div class="card-head"><span class="card-title">Alert Details</span></div>

            <div class="fg"><label class="fl">Severity</label><select class="fs" name="severity"><option value="info">Info</option><option value="warning">Warning</option><option value="critical">Critical</option></select></div>

            <button class="btn-cyan" type="submit" style="width:100%">📢 Broadcast Alert</button>

        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Active Alerts</span><span class="badge badge-live">Real-Time</span></div>
        <div class="card-body" id="hospitalAlertsList"><p class="page-sub">Broadcasts will appear here once sent.</p></div>
      </div>
    </div>`;
  document.getElementById('alertForm').addEventListener('submit', async e=>{
    e.preventDefault();

}

  bloodbank: { records: renderBankRecords },
};

// Override to handle lazy renders not covered in switchPanel

  const nav=document.getElementById('navTabs');
  // Handled via switchPanel already
})();

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
async function init(){
  try{
    const data=await LL.me();
    renderShell(data.user);

    // Load socket.io script then connect
    const script=document.createElement('script');
    script.src=`${LL.origin}/socket.io/socket.io.js`;
    script.onload=initSocket;
    script.onerror=()=>console.warn('Socket.IO not available — real-time disabled');
    document.head.appendChild(script);

    // Hash-based initial panel
    const hash=location.hash.replace('#','');
    const tabs=ROLE_TABS[data.user.role]||[];
    if(tabs.find(t=>t.id===hash)) setTimeout(()=>switchPanel(hash),100);

    // Register lazy panel handlers
    const lazyMap = LAZY[data.user.role]||{};
    document.getElementById('navTabs').querySelectorAll('.nav-tab').forEach(b=>{
      const lazy=lazyMap[b.dataset.panel];
      if(lazy) b.addEventListener('click',()=>{ if(!document.getElementById(`panel-${b.dataset.panel}`)?.dataset.loaded){ lazy(); document.getElementById(`panel-${b.dataset.panel}`).dataset.loaded='1'; } });
    });

  }catch(_){
    LL.clearSession();
    location.href='./login.html';
  }
}

init();
</script>
