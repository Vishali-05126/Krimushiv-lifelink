<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLink Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --primary-light: #3b82f6;
      --primary-soft: #eff6ff;
      --accent: #10b981;
      --gold: #f59e0b;
      --danger: #ef4444;
      --text: #0f172a;
      --text-soft: #475569;
      --muted: #94a3b8;
      --border: #dbeafe;
      --bg: #f0f4ff;
      --white: #fff;
      --head: "Syne", sans-serif;
      --body: "DM Sans", sans-serif;
      --mono: "Space Mono", monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--body); overflow-x: hidden; }
    .app { display: flex; min-height: 100vh; }
    .side {
      position: fixed;
      inset: 0 auto 0 0;
      width: 250px;
      background: var(--white);
      border-right: 1px solid var(--border);
      box-shadow: 2px 0 12px rgba(29,78,216,0.06);
      display: flex;
      flex-direction: column;
      z-index: 20;
      overflow-y: auto;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      font: 800 20px var(--head);
      color: var(--primary);
    }
    .logo span { color: var(--accent); }
    .logo-mark {
      width: 32px; height: 32px; border-radius: 10px;
      display: grid; place-items: center;
      color: #fff; background: var(--primary);
      font-size: 12px;
      animation: pulseLogo 2s infinite;
    }
    .role-chip {
      margin: 12px;
      padding: 14px;
      border-radius: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--role-color, var(--primary)), var(--role-dark, var(--primary-dark)));
    }
    .role-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.24);
      display: grid; place-items: center;
      font: 800 13px var(--head);
      flex: 0 0 auto;
    }
    .role-name { font-weight: 800; font-size: 13px; }
    .role-meta { font: 700 10px var(--mono); opacity: 0.8; text-transform: uppercase; margin-top: 2px; }
    .nav-label {
      padding: 14px 20px 6px;
      color: var(--muted);
      font: 700 9px var(--mono);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .nav-item {
      width: 100%;
      min-height: 40px;
      border: 0;
      border-left: 3px solid transparent;
      background: transparent;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      text-align: left;
      font: 600 13px var(--body);
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-item:hover, .nav-item.active { background: var(--primary-soft); color: var(--primary); border-left-color: var(--primary); }
    .nav-item:hover { transform: translateX(2px); }
    .nav-icon { width: 20px; text-align: center; font-size: 15px; flex: 0 0 auto; }
    .side-spacer { flex: 1; }
    .switch-role, .logout {
      margin: 12px;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-soft);
      background: #f8faff;
      font-weight: 800;
      cursor: pointer;
    }
    .switch-role { margin-bottom: 0; }
    .switch-role:hover, .logout:hover { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
    .topbar {
      position: fixed;
      top: 0; left: 250px; right: 0;
      height: 60px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 8px rgba(29,78,216,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 10;
    }
    .topbar-title { font: 800 16px var(--head); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .sos {
      border: 0;
      border-radius: 8px;
      background: var(--danger);
      color: #fff;
      padding: 9px 16px;
      font: 800 12px var(--head);
      cursor: pointer;
      animation: pulseDanger 2.5s infinite;
    }
    .main {
      margin-left: 250px;
      margin-top: 60px;
      min-height: calc(100vh - 60px);
      width: calc(100% - 250px);
      padding: 32px 36px 48px;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .page-header { margin-bottom: 28px; }
    .eyebrow {
      color: var(--primary-light);
      font: 700 10px var(--mono);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .page-title { margin: 0 0 6px; font: 800 clamp(28px, 3vw, 40px)/1.1 var(--head); }
    .page-title span { color: var(--primary-light); }
    .page-sub { margin: 0; color: var(--text-soft); max-width: 620px; line-height: 1.6; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card, .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .stat-card:hover, .card:hover, .panel-card:hover { transform: translateY(-3px); box-shadow: 0 18px 42px rgba(29,78,216,0.1); border-color: #bfdbfe; }
    .stat-card::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      background: var(--sc-color, var(--primary));
    }
    .stat-num { font: 800 32px var(--head); margin-bottom: 4px; }
    .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 800; }
    .stat-note { margin-top: 6px; color: var(--text-soft); font-size: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; align-items: start; }
    .panel-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel-head-title { font: 800 14px var(--head); }
    .panel-body { padding: 20px; }
    .badge {
      border-radius: 999px;
      padding: 4px 10px;
      font: 700 10px var(--mono);
      white-space: nowrap;
    }
    .badge-live { color: var(--accent); background: rgba(16,185,129,0.14); border: 1px solid rgba(16,185,129,0.26); }
    .badge-urgent { color: var(--danger); background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.24); }
    .badge-info { color: var(--primary); background: rgba(29,78,216,0.12); border: 1px solid rgba(29,78,216,0.18); }
    .list-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid #f0f4ff; }
    .list-item:last-child { border-bottom: 0; }
    .li-icon {
      width: 38px; height: 38px; border-radius: 12px;
      display: grid; place-items: center;
      background: var(--primary-soft);
      color: var(--primary);
      font: 800 12px var(--head);
      flex: 0 0 auto;
    }
    .li-body { flex: 1; min-width: 0; }
    .li-title { font-weight: 800; font-size: 13px; }
    .li-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .li-right { text-align: right; font: 700 12px var(--mono); flex: 0 0 auto; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-soft);
      font: 700 11px var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-input, .form-select, textarea.form-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #f8faff;
      color: var(--text);
      font: 400 13px var(--body);
      outline: none;
    }
    textarea.form-input { min-height: 92px; resize: vertical; }
    .btn-primary, .btn-secondary, .btn-red, .btn-green {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border-radius: 10px;
      padding: 9px 16px;
      font-weight: 800;
      cursor: pointer;
      border: 0;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #f8faff; color: var(--text-soft); border: 1px solid var(--border); }
    .btn-red { background: var(--danger); color: #fff; }
    .btn-green { background: var(--accent); color: #fff; }
    .btn-primary:hover, .btn-red:hover, .btn-green:hover { transform: scale(1.02); filter: brightness(1.04); }
    .btn-secondary:hover { background: var(--primary-soft); color: var(--primary); }
    .message { min-height: 20px; color: var(--danger); font-size: 13px; margin-top: 10px; }
    .message.ok { color: var(--accent); }
    .inv-row { display: grid; grid-template-columns: 46px 1fr 64px 82px; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid #f0f4ff; }
    .inv-row:last-child { border-bottom: 0; }
    .inv-type { font: 800 14px var(--head); }
    .inv-bar-bg { height: 8px; border-radius: 999px; background: #f0f4ff; overflow: hidden; }
    .inv-bar { height: 100%; border-radius: 999px; }
    .inv-units { color: var(--muted); font: 700 12px var(--mono); text-align: right; }
    .inv-status { border-radius: 5px; padding: 3px 7px; font-size: 10px; font-weight: 800; text-align: center; }
    .st-ok { color: var(--accent); background: rgba(16,185,129,0.12); }
    .st-low { color: var(--gold); background: rgba(245,158,11,0.12); }
    .st-crit { color: var(--danger); background: rgba(239,68,68,0.12); }
    .alert {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(239,68,68,0.2);
      background: rgba(239,68,68,0.08);
      color: #991b1b;
      line-height: 1.45;
    }
    .map-block {
      position: relative;
      min-height: 260px;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      border: 1px solid var(--border);
    }
    .map-block::before {
      content: "";
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(29,78,216,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(29,78,216,0.08) 1px, transparent 1px);
      background-size: 36px 36px;
    }
    .pin { position: absolute; transform: translate(-50%, -50%); z-index: 1; text-align: center; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; margin: 0 auto 4px; border: 2px solid #fff; box-shadow: 0 0 0 5px rgba(29,78,216,0.12); }
    .pin-label { font: 700 10px var(--mono); background: #fff; border-radius: 5px; padding: 3px 6px; white-space: nowrap; }
    @keyframes pulseLogo {
      0%, 100% { box-shadow: 0 0 0 0 rgba(29,78,216,0.35); }
      50% { box-shadow: 0 0 0 8px rgba(29,78,216,0); }
    }
    @keyframes pulseDanger {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      60% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }
    @media (max-width: 900px) {
      .app { display: block; }
      .side { position: static; width: 100%; height: auto; }
      .topbar { position: sticky; left: 0; top: 0; }
      .main { margin: 0; width: 100%; padding: 24px 18px; }
      .grid-2, .grid-1-2, .form-row { grid-template-columns: 1fr; }
      .inv-row { grid-template-columns: 44px 1fr; }
      .inv-units, .inv-status { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="logo"><div class="logo-mark">LL</div>Life<span>Link</span></div>
      <div class="role-chip" id="roleChip">
        <div class="role-avatar" id="roleInitials">LL</div>
        <div><div class="role-name" id="sideName">Loading...</div><div class="role-meta" id="sideRole">Checking session</div></div>
      </div>
      <div class="nav-label">Workspace</div>
      <nav id="nav"></nav>
      <div class="side-spacer"></div>
      <button class="switch-role" type="button" onclick="switchRole()">Switch Role</button>
      <button class="logout" type="button" onclick="LL.logout()">Logout</button>
    </aside>

    <div class="page">
      <header class="topbar">
        <div class="topbar-title" id="pageTitle">Dashboard</div>
        <div class="topbar-right">
          <button class="sos" type="button" onclick="toast('SOS created', 'Emergency blood request tools are in your role workspace.')">SOS</button>
        </div>
      </header>
      <main class="main" id="main">
        <div class="panel active" id="panel-overview"></div>
        <div class="panel" id="panel-workspace"></div>
        <div class="panel" id="panel-inventory"></div>
        <div class="panel" id="panel-ai"></div>
      </main>
    </div>
  </div>

  <script src="./lifelink-api.js"></script>
  <script>
    LL.requireAuth();

    const state = { user: LL.getUser(), inventory: [], donors: [], alerts: [] };
    const navHost = document.getElementById('nav');
    const panels = ['overview', 'workspace', 'inventory', 'ai'];

    const roles = {
      donor: { label: 'Blood Donor', color: '#1d4ed8', dark: '#1e3a8a', avatar: 'BD' },
      receiver: { label: 'Receiver', color: '#10b981', dark: '#047857', avatar: 'RC' },
      hospital: { label: 'Hospital', color: '#f59e0b', dark: '#b45309', avatar: 'HP' },
      bloodbank: { label: 'Blood Bank', color: '#8b5cf6', dark: '#6d28d9', avatar: 'BB' },
      admin: { label: 'Admin', color: '#475569', dark: '#0f172a', avatar: 'AD' },
    };

    function roleLabel(role) {
      return roles[role]?.label || 'LifeLink';
    }

    function initials(name = 'LifeLink') {
      return name.split(/\s+/).filter(Boolean).slice(0, 2).map((part) => part[0]).join('').toUpperCase();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char]));
    }

    function setNav(user) {
      const workspaceLabel = {
        donor: 'Donation Readiness',
        receiver: 'Request Monitor',
        hospital: 'Operations Center',
        bloodbank: 'Stock Control',
      }[user.role] || `${roleLabel(user.role)} Workspace`;
      const inventoryLabel = user.role === 'bloodbank' ? 'Expiry & Inventory' : 'Blood Availability';
      const aiLabel = user.role === 'hospital' ? 'Donor Dispatch' : 'AI Dispatch';
      const items = [
        { id: 'overview', icon: '◆', label: 'Overview' },
        { id: 'workspace', icon: '●', label: workspaceLabel },
        { id: 'inventory', icon: '■', label: inventoryLabel },
        { id: 'ai', icon: '▲', label: aiLabel },
      ];
      navHost.innerHTML = items.map((item, index) => `
        <button class="nav-item ${index === 0 ? 'active' : ''}" type="button" data-panel="${item.id}">
          <span class="nav-icon">${item.icon}</span>${item.label}
        </button>
      `).join('');
      navHost.querySelectorAll('.nav-item').forEach((button) => button.addEventListener('click', () => switchPanel(button.dataset.panel)));
    }

    function switchPanel(id) {
      panels.forEach((panel) => document.getElementById(`panel-${panel}`).classList.toggle('active', panel === id));
      navHost.querySelectorAll('.nav-item').forEach((button) => button.classList.toggle('active', button.dataset.panel === id));
      document.getElementById('pageTitle').textContent = navHost.querySelector(`[data-panel="${id}"]`)?.textContent.trim().replace(/^\d+/, '').trim() || 'Dashboard';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function initialPanel(user) {
      const hash = window.location.hash.replace('#', '');
      if (panels.includes(hash)) return hash;
      if (hash === user.role) return 'workspace';
      return 'overview';
    }

    function renderShell(user) {
      state.user = user;
      const role = roles[user.role] || roles.admin;
      document.getElementById('roleChip').style.setProperty('--role-color', role.color);
      document.getElementById('roleChip').style.setProperty('--role-dark', role.dark);
      document.getElementById('sideName').textContent = user.name || 'LifeLink User';
      document.getElementById('sideRole').textContent = roleLabel(user.role);
      document.getElementById('roleInitials').textContent = role.avatar || initials(user.name);
      setNav(user);
      renderOverview(user);
      renderWorkspace(user);
      renderAI();
      switchPanel(initialPanel(user));
      if (user.role === 'donor') loadDonorAlerts();
    }

    function renderOverview(user) {
      const blood = user.bloodType || user.requiredBloodType || 'N/A';
      const roleName = roleLabel(user.role);
      const title = {
        donor: 'Donation readiness and live alerts',
        receiver: 'Blood request tracking',
        hospital: 'Emergency operations center',
        bloodbank: 'Inventory and expiry control',
      }[user.role] || 'LifeLink command center';
      document.getElementById('panel-overview').innerHTML = `
        <div class="page-header">
          <div class="eyebrow">${escapeHtml(roleName)} Dashboard</div>
          <h1 class="page-title">${escapeHtml(title)} <span>online</span></h1>
          <p class="page-sub">${escapeHtml(user.name || 'Your account')} is connected to the LifeLink network. Use the workspace tabs to manage role-specific tools.</p>
        </div>
        <div class="stats-row">
          <div class="stat-card" style="--sc-color:#1d4ed8"><div class="stat-num">${escapeHtml(roleName)}</div><div class="stat-label">Role</div><div class="stat-note">${escapeHtml(user.email || '')}</div></div>
          <div class="stat-card" style="--sc-color:#10b981"><div class="stat-num">${escapeHtml(blood)}</div><div class="stat-label">Blood Type</div><div class="stat-note">Used for matching and supply visibility.</div></div>
          <div class="stat-card" style="--sc-color:#f59e0b"><div class="stat-num">${user.role === 'donor' ? escapeHtml(user.status || 'available') : 'Live'}</div><div class="stat-label">${user.role === 'donor' ? 'Donor Status' : 'Network Status'}</div><div class="stat-note">${user.role === 'donor' ? escapeHtml(LL.donationStatus(user.lastDonation)) : 'Connected through the LifeLink API.'}</div></div>
        </div>
        <div class="grid-2">
          <div class="panel-card">
            <div class="panel-head"><span class="panel-head-title">Network Snapshot</span><span class="badge badge-live">Live</span></div>
            <div class="panel-body">
              ${networkItems().map(item => listItem(item.type, item.title, item.sub, item.right)).join('')}
            </div>
          </div>
          <div class="panel-card">
            <div class="panel-head"><span class="panel-head-title">Coverage Map</span><span class="badge badge-info">City View</span></div>
            <div class="panel-body">
              <div class="map-block">
                <div class="pin" style="left:50%;top:55%"><div class="pin-dot" style="background:#f59e0b"></div><div class="pin-label">You</div></div>
                <div class="pin" style="left:28%;top:32%"><div class="pin-dot" style="background:#10b981"></div><div class="pin-label">Donor 22m</div></div>
                <div class="pin" style="left:72%;top:28%"><div class="pin-dot" style="background:#1d4ed8"></div><div class="pin-label">Bank 15m</div></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function networkItems() {
      return [
        { type: 'O-', title: 'Critical O- request', sub: 'ICU road accident case, 2 units needed', right: '22m' },
        { type: 'A+', title: 'Matched donor en route', sub: 'Emergency surgery request', right: '35m' },
        { type: 'BB', title: 'City Blood Center', sub: 'Inventory shared with network', right: '74u' },
      ];
    }

    function listItem(icon, title, sub, right) {
      return `
        <div class="list-item">
          <div class="li-icon">${escapeHtml(icon)}</div>
          <div class="li-body"><div class="li-title">${escapeHtml(title)}</div><div class="li-sub">${escapeHtml(sub)}</div></div>
          <div class="li-right">${escapeHtml(right)}</div>
        </div>
      `;
    }

    function renderWorkspace(user) {
      if (user.role === 'donor') return renderDonor(user);
      if (user.role === 'receiver') return renderReceiver(user);
      if (user.role === 'hospital') return renderHospital(user);
      if (user.role === 'bloodbank') return renderBloodBank(user);
      renderHospital(user);
    }

    function renderDonor(user) {
      document.getElementById('panel-workspace').innerHTML = `
        <div class="page-header">
          <div class="eyebrow">Donor Workspace</div>
          <h1 class="page-title">Donation <span>Readiness</span></h1>
          <p class="page-sub">Keep your availability and last donation current so emergency matches stay accurate.</p>
        </div>
        <div class="stats-row">
          <div class="stat-card" style="--sc-color:#1d4ed8"><div class="stat-num">${user.donations || 0}</div><div class="stat-label">Donations</div></div>
          <div class="stat-card" style="--sc-color:#10b981"><div class="stat-num">${user.livesSaved || 0}</div><div class="stat-label">Lives Saved</div></div>
          <div class="stat-card" style="--sc-color:#f59e0b"><div class="stat-num">${escapeHtml(user.bloodType || 'N/A')}</div><div class="stat-label">Blood Group</div></div>
        </div>
        <div class="grid-2">
          <div class="panel-card">
            <div class="panel-head"><span class="panel-head-title">Live Blood Need Notifications</span><span class="badge badge-live">Nearby</span></div>
            <div class="panel-body">
              <div id="donorAlerts" class="li-sub">Checking nearby requests...</div>
              <p class="message" id="alertMessage"></p>
            </div>
          </div>
          <div class="panel-card">
            <div class="panel-head"><span class="panel-head-title">Record Donation</span></div>
            <div class="panel-body">
              <form id="donationForm">
                <div class="form-group"><label class="form-label">Donation Date</label><input class="form-input" name="donationDate" type="date" required></div>
                <div class="form-group"><label class="form-label">Lives Saved Estimate</label><input class="form-input" name="livesSavedToAdd" type="number" min="1" value="3"></div>
                <button class="btn-primary" type="submit" style="width:100%">Record Donation</button>
              </form>
              <p class="message" id="donationMessage"></p>
            </div>
          </div>
        </div>
      `;
      document.getElementById('donationForm').addEventListener('submit', submitDonation);
    }

    function renderReceiver(user) {
      document.getElementById('panel-workspace').innerHTML = `
        <div class="page-header">
          <div class="eyebrow">Receiver Workspace</div>
          <h1 class="page-title">Blood Request <span>Monitor</span></h1>
          <p class="page-sub">Track the need profile, urgency, and nearby network visibility.</p>
        </div>
        <div class="stats-row">
          <div class="stat-card" style="--sc-color:#1d4ed8"><div class="stat-num">${escapeHtml(user.requiredBloodType || 'N/A')}</div><div class="stat-label">Required Blood</div></div>
          <div class="stat-card" style="--sc-color:#ef4444"><div class="stat-num">${escapeHtml(user.urgency || 'routine')}</div><div class="stat-label">Urgency</div></div>
          <div class="stat-card" style="--sc-color:#10b981"><div class="stat-num">${escapeHtml(user.attendingHospital || 'N/A')}</div><div class="stat-label">Hospital</div></div>
        </div>
        <div class="grid-2">
          <div class="panel-card"><div class="panel-head"><span class="panel-head-title">Essential Actions</span></div><div class="panel-body"><p class="page-sub">Review available inventory, then use AI Dispatch to rank emergency matches.</p><br><button class="btn-primary" onclick="switchPanel('inventory')">Check Inventory</button> <button class="btn-secondary" onclick="switchPanel('ai')">Open Dispatch</button></div></div>
          <div class="panel-card"><div class="panel-head"><span class="panel-head-title">Care Notes</span></div><div class="panel-body">${listItem('MD', 'Medical condition', user.medicalCondition || 'Not provided', 'Info')}${listItem('GN', 'Guardian', user.guardianName || 'Not provided', 'Contact')}</div></div>
        </div>
      `;
    }

    function renderHospital(user) {
      document.getElementById('panel-workspace').innerHTML = `
        <div class="page-header">
          <div class="eyebrow">Hospital Operations</div>
          <h1 class="page-title">Operations <span>Center</span></h1>
          <p class="page-sub">${escapeHtml(user.hospitalName || user.name || 'Hospital')} real-time blood coordination.</p>
        </div>
        <div class="alert"><strong>2 critical cases</strong><span> requiring O- and A+ blood. Dispatch ranking is ready in the AI tab.</span></div>
        <div class="stats-row">
          <div class="stat-card" style="--sc-color:#f59e0b"><div class="stat-num">5</div><div class="stat-label">Active Requests</div><div class="stat-note">2 critical</div></div>
          <div class="stat-card" style="--sc-color:#10b981"><div class="stat-num">3</div><div class="stat-label">Donors En Route</div><div class="stat-note">Avg 28 min ETA</div></div>
          <div class="stat-card" style="--sc-color:#1d4ed8"><div class="stat-num">${user.hasBloodBank ? 'Yes' : 'No'}</div><div class="stat-label">Blood Bank</div></div>
        </div>
        <div class="grid-2">
          <div class="panel-card"><div class="panel-head"><span class="panel-head-title">Active Emergency Requests</span><span class="badge badge-urgent">Critical</span></div><div class="panel-body">${networkItems().map(item => listItem(item.type, item.title, item.sub, item.right)).join('')}<button class="btn-red" style="width:100%;margin-top:14px" onclick="toast('Request active', 'Emergency blood request broadcast to nearby donors and blood banks.')">New Emergency Request</button></div></div>
          <div class="panel-card"><div class="panel-head"><span class="panel-head-title">Hospital Profile</span></div><div class="panel-body">${listItem('HP', user.hospitalName || user.name, user.registrationNumber || 'Registration not provided', user.hospitalType || 'Type')}${listItem('TX', 'Trauma centre', user.isTraumaCentre ? 'Available' : 'Not marked', user.isTraumaCentre ? 'Yes' : 'No')}</div></div>
        </div>
      `;
    }

    function renderBloodBank(user) {
      document.getElementById('panel-workspace').innerHTML = `
        <div class="page-header">
          <div class="eyebrow">Blood Bank Operations</div>
          <h1 class="page-title">Collection and <span>Expiry</span></h1>
          <p class="page-sub">Add blood unit records and keep stock visible to hospitals.</p>
        </div>
        <div class="grid-1-2">
          <div class="panel-card">
            <div class="panel-head"><span class="panel-head-title">New Blood Record</span></div>
            <div class="panel-body">
              <form id="bloodRecordForm">
                <div class="form-row">
                  <div class="form-group"><label class="form-label">Blood Type</label><select class="form-select" name="bloodType" required><option>O+</option><option>O-</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option></select></div>
                  <div class="form-group"><label class="form-label">Component</label><select class="form-select" name="component"><option value="whole_blood">Whole blood</option><option value="red_cells">Red cells</option><option value="plasma">Plasma</option><option value="platelets">Platelets</option></select></div>
                </div>
                <div class="form-row">
                  <div class="form-group"><label class="form-label">Units</label><input class="form-input" name="units" type="number" min="1" value="1"></div>
                  <div class="form-group"><label class="form-label">Status</label><select class="form-select" name="status"><option value="available">Available</option><option value="low">Low</option><option value="critical">Critical</option><option value="reserved">Reserved</option></select></div>
                </div>
                <div class="form-row">
                  <div class="form-group"><label class="form-label">Collected On</label><input class="form-input" name="collectionDate" type="date" required></div>
                  <div class="form-group"><label class="form-label">Expiry Date</label><input class="form-input" name="expiryDate" type="date"></div>
                </div>
                <button class="btn-primary" type="submit" style="width:100%">Save Blood Record</button>
              </form>
              <p class="message" id="bankMessage"></p>
            </div>
          </div>
          <div class="panel-card"><div class="panel-head"><span class="panel-head-title">Bank Profile</span></div><div class="panel-body">${listItem('BK', user.bankName || user.name, user.licenseNumber || 'License not provided', user.acceptingDonors === false ? 'Closed' : 'Open')}${listItem('HR', 'Operating hours', user.operatingHours || 'Not provided', 'Hours')}</div></div>
        </div>
      `;
      document.getElementById('bloodRecordForm').addEventListener('submit', submitBloodRecord);
    }

    function renderInventory(records = state.inventory) {
      const total = records.reduce((sum, item) => sum + Number(item.units || 0), 0);
      const expiring = records.filter((item) => Number(item.daysUntilExpiry) <= 7).length;
      document.getElementById('panel-inventory').innerHTML = `
        <div class="page-header">
          <div class="eyebrow">Supply Chain</div>
          <h1 class="page-title">Blood <span>Inventory</span></h1>
          <p class="page-sub">Live blood unit records from the LifeLink backend.</p>
        </div>
        <div class="stats-row">
          <div class="stat-card" style="--sc-color:#10b981"><div class="stat-num">${total}</div><div class="stat-label">Total Units</div></div>
          <div class="stat-card" style="--sc-color:#f59e0b"><div class="stat-num">${expiring}</div><div class="stat-label">Expiring Soon</div></div>
          <div class="stat-card" style="--sc-color:#ef4444"><div class="stat-num">${records.filter((item) => ['critical', 'expired'].includes(item.expiryStatus || item.status)).length}</div><div class="stat-label">Critical</div></div>
        </div>
        <div class="panel-card">
          <div class="panel-head"><span class="panel-head-title">Network Stock</span><span class="badge badge-live">Real-Time</span></div>
          <div class="panel-body">
            ${records.length ? records.map(inventoryRow).join('') : '<p class="page-sub">No records found yet. Blood banks can add records from their workspace.</p>'}
          </div>
        </div>
      `;
    }

    function inventoryRow(item) {
      const units = Number(item.units || 0);
      const status = item.expiryStatus || item.status || (units < 5 ? 'critical' : units < 10 ? 'low' : 'ok');
      const pct = Math.min(100, Math.max(4, units * 6));
      const color = status === 'critical' || status === 'expired' ? 'var(--danger)' : status === 'low' ? 'var(--gold)' : 'var(--accent)';
      const klass = status === 'critical' || status === 'expired' ? 'st-crit' : status === 'low' ? 'st-low' : 'st-ok';
      return `
        <div class="inv-row">
          <div class="inv-type">${escapeHtml(item.bloodType || 'N/A')}</div>
          <div><div class="inv-bar-bg"><div class="inv-bar" style="width:${pct}%;background:${color}"></div></div><div class="li-sub">${escapeHtml(String(item.component || 'whole blood').replace('_', ' '))} - expires ${escapeHtml(LL.formatDate(item.expiryDate))}</div></div>
          <div class="inv-units">${units} units</div>
          <div class="inv-status ${klass}">${escapeHtml(status)}</div>
        </div>
      `;
    }

    function renderAI() {
      document.getElementById('panel-ai').innerHTML = `
        <div class="page-header">
          <div class="eyebrow">AI Dispatch</div>
          <h1 class="page-title">Emergency <span>Matching</span></h1>
          <p class="page-sub">Rank available donors by compatibility, availability, and distance.</p>
        </div>
        <div class="grid-2">
          <div class="panel-card">
            <div class="panel-head"><span class="panel-head-title">Dispatch Request</span></div>
            <div class="panel-body">
              <form id="triageForm">
                <div class="form-row">
                  <div class="form-group"><label class="form-label">Blood Type Needed</label><select class="form-select" name="bloodType"><option>O-</option><option>O+</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option></select></div>
                  <div class="form-group"><label class="form-label">Units Required</label><select class="form-select" name="units"><option>1</option><option selected>2</option><option>3</option><option>4</option></select></div>
                </div>
                <div class="form-group"><label class="form-label">Hospital / Location</label><input class="form-input" name="hospital" value="${escapeHtml(state.user?.hospitalName || state.user?.attendingHospital || 'Nearest hospital')}"></div>
                <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" name="notes" placeholder="Patient context or compatibility needs"></textarea></div>
                <button class="btn-primary" type="submit" style="width:100%">Run Emergency Dispatch</button>
              </form>
            </div>
          </div>
          <div class="panel-card">
            <div class="panel-head"><span class="panel-head-title">Ranked Matches</span><span class="badge badge-info">AI</span></div>
            <div class="panel-body" id="triageResults"><p class="page-sub">Ready to rank available donors.</p></div>
          </div>
        </div>
      `;
      document.getElementById('triageForm').addEventListener('submit', runTriage);
    }

    async function submitDonation(event) {
      event.preventDefault();
      const msg = document.getElementById('donationMessage');
      msg.textContent = '';
      msg.classList.remove('ok');
      try {
        const data = await LL.updateDonation(Object.fromEntries(new FormData(event.currentTarget)));
        msg.textContent = data.message || 'Donation recorded.';
        msg.classList.add('ok');
        renderShell(data.user);
      } catch (err) {
        msg.textContent = err.message;
      }
    }

    function hospitalLocation(alert) {
      const coordinates = alert.hospital?.location?.coordinates || [];
      const lng = coordinates[0];
      const lat = coordinates[1];
      if (Number.isFinite(Number(lat)) && Number.isFinite(Number(lng))) return `${Number(lat).toFixed(4)}, ${Number(lng).toFixed(4)}`;
      return alert.hospital?.address || 'Location shared after accept';
    }

    function renderDonorAlerts(alerts) {
      const host = document.getElementById('donorAlerts');
      if (!host) return;
      state.alerts = alerts;
      host.innerHTML = alerts.length ? alerts.map((alert) => `
        <div class="list-item">
          <div class="li-icon">${escapeHtml(alert.bloodType || 'N/A')}</div>
          <div class="li-body">
            <div class="li-title">${escapeHtml(alert.title || 'Blood request')}</div>
            <div class="li-sub">${escapeHtml(alert.message || 'Hospital needs blood support.')}</div>
            <div class="li-sub">${escapeHtml(alert.hospital?.name || 'Hospital')} - ${escapeHtml(hospitalLocation(alert))}</div>
          </div>
          <div class="li-right">
            <button class="btn-green" type="button" onclick="acceptDonorAlert('${escapeHtml(alert._id || alert.id)}')">Accept</button>
          </div>
        </div>
      `).join('') : '<p class="page-sub">No active blood requests match your blood type right now.</p>';
    }

    async function loadDonorAlerts() {
      const host = document.getElementById('donorAlerts');
      if (!host || state.user?.role !== 'donor') return;
      try {
        const coords = state.user.location?.coordinates || [];
        const data = await LL.loadAlerts({ bloodType: state.user.bloodType, lng: coords[0], lat: coords[1] });
        renderDonorAlerts(data.alerts || []);
      } catch (err) {
        host.innerHTML = `<p class="message">${escapeHtml(err.message)}</p>`;
      }
    }

    async function acceptDonorAlert(id) {
      const msg = document.getElementById('alertMessage');
      if (msg) msg.textContent = '';
      try {
        const data = await LL.acceptAlert(id);
        if (msg) {
          msg.textContent = data.message || 'Alert accepted.';
          msg.classList.add('ok');
        }
        if (data.user) renderShell(data.user);
      } catch (err) {
        if (msg) msg.textContent = err.message;
      }
    }

    async function submitBloodRecord(event) {
      event.preventDefault();
      const msg = document.getElementById('bankMessage');
      msg.textContent = '';
      msg.classList.remove('ok');
      try {
        await LL.createBloodRecord(Object.fromEntries(new FormData(event.currentTarget)));
        msg.textContent = 'Blood record saved.';
        msg.classList.add('ok');
        await loadInventory();
      } catch (err) {
        msg.textContent = err.message;
      }
    }

    function runTriage(event) {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.currentTarget));
      const donors = state.donors.length ? state.donors : [
        { name: 'Riya Mehta', bloodType: 'O-', status: 'available', distanceKm: 2.4 },
        { name: 'Arjun Rao', bloodType: 'A+', status: 'available', distanceKm: 4.1 },
        { name: 'Nisha Kumar', bloodType: 'AB-', status: 'busy', distanceKm: 7.8 },
      ];
      const matches = donors.map((donor) => {
        const distance = Number(donor.distanceKm || donor.distance || 6);
        const compatible = donor.bloodType === payload.bloodType || donor.bloodType === 'O-';
        const score = Math.round((compatible ? 64 : 28) + (donor.status === 'available' ? 18 : -10) + Math.max(0, 16 - distance));
        return { ...donor, score, eta: Math.max(6, Math.round(distance * 4 + (donor.status === 'available' ? 4 : 12))) };
      }).sort((a, b) => b.score - a.score).slice(0, 5);
      document.getElementById('triageResults').innerHTML = matches.map((donor, index) => listItem(`#${index + 1}`, `${donor.name} - ${donor.bloodType || 'N/A'}`, `${donor.status || 'unknown'} - score ${donor.score}/100`, `${donor.eta}m`)).join('');
    }

    function toast(title, detail) {
      alert(`${title}\n${detail}`);
    }

    function switchRole() {
      LL.clearSession();
      window.location.href = './login.html';
    }

    async function loadInventory() {
      try {
        const data = await LL.loadBloodBank();
        state.inventory = data.inventory || [];
        state.donors = data.donors || [];
        renderInventory(state.inventory);
      } catch (err) {
        document.getElementById('panel-inventory').innerHTML = `<div class="panel-card"><div class="panel-body"><p class="message">${escapeHtml(err.message)}</p></div></div>`;
      }
    }

    async function init() {
      try {
        const data = await LL.me();
        renderShell(data.user);
      } catch (_err) {
        LL.clearSession();
        window.location.href = './login.html';
        return;
      }
      await loadInventory();
    }

    init();
  </script>
</body>
</html>
